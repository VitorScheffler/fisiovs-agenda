services:
  fisiovs-agenda:
    build:
      context: .
      dockerfile: Dockerfile
    image: fisiovs-agenda:latest
    container_name: fisiovs-agenda
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - fisiovs_data:/data
      - fisiovs_uploads:/app/public/uploads
    ports:
      - "3000:3000"
    networks:
      - default
      - noc-shared

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: fisiovs-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - .env.production
    depends_on:
      - fisiovs-agenda
    networks:
      - default

volumes:
  fisiovs_data:
  fisiovs_uploads:

networks:
  default:
  noc-shared:
    external: true